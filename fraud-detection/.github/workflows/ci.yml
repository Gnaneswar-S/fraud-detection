name: CI/CD — Fraud Detection Engine

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: fraud-detection-api

jobs:
  # ─────────────────────────────────────────────
  # 1. LINT
  # ─────────────────────────────────────────────
  lint:
    name: "Lint (ruff)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff
      - run: ruff check api/ batch/ tests/ model/ --ignore E501,E402,E731,F401

  # ─────────────────────────────────────────────
  # 2. TEST (77 tests, no Postgres needed)
  # ─────────────────────────────────────────────
  test:
    name: "pytest (77 tests)"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run full test suite
        run: pytest tests/ -v --tb=short
        env:
          SECRET_KEY: "ci_test_secret_key_32chars_minimum_required"
          API_USERNAME: analyst
          API_PASSWORD: changeme
          DATABASE_URL: "sqlite:///./test_ci.db"
          MODEL_VERSION: "1.0.0"
          MODEL_PATH: "model/fraud_model.pkl"
          SCALER_PATH: "model/scaler.pkl"

  # ─────────────────────────────────────────────
  # 3. DOCKER BUILD
  # ─────────────────────────────────────────────
  docker-build:
    name: "Docker build"
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # 4. DEPLOY TO RENDER (main branch only)
  # ─────────────────────────────────────────────
  deploy:
    name: "Deploy → Render"
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render deploy hook
        run: curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
        # Set RENDER_DEPLOY_HOOK_URL in:
        # GitHub → repo → Settings → Secrets and variables → Actions